    <main>

        <h1>Contact Us</h1>

        <div class="contact-container">

            <section>

                <h2>Contact Information</h2>
                
                <p>
                    Email:
                    support@greentechsolutions.com
                </p>

                <p>
                    Phone:
                    (555) 123-4567
                </p>

                <p>
                    Address:
                    123 Green Street,
                    Eco City, NM
                </p>

            </section>





            
            <section>


                <h2>Send Us a Message</h2>
                
                <form id="form" novalidate>

                    <label for="nameInput">
                        Name:
                    </label>



                    <input
                        type="text"
                        id="nameInput"
                        placeholder="Enter your name">

                    <label for="emailInput">
                        Email:
                    </label>



                    <input
                        type="email"
                        id="emailInput"
                        placeholder="Enter your email">

                    <button type="submit">
                        Submit
                    </button>

                </form>



                <p id="message">
                    Your message will appear here.
                </p>



            </section>

        </div>
